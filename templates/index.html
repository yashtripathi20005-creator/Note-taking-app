<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Note Taking App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Note Taking App</h1>
            <button id="newNoteBtn" class="btn-primary">+ New Note</button>
        </header>

        <div class="main-content">
            <!-- Notes Sidebar -->
            <aside class="notes-list">
                <h2>All Notes</h2>
                <div id="notesContainer">
                    <!-- Notes will be rendered here -->
                </div>
            </aside>

            <!-- Note Editor -->
            <section class="note-editor">
                <div id="noteEditor">
                    <div class="empty-state">
                        <p>📄 Select a note to view or edit</p>
                        <p class="empty-sub">Or click "New Note" to create one</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Modal for creating/editing notes -->
    <div id="noteModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">New Note</h2>
            <form id="noteForm">
                <div class="form-group">
                    <label for="noteTitle">Title:</label>
                    <input type="text" id="noteTitle" placeholder="Enter note title" required>
                </div>
                <div class="form-group">
                    <label for="noteContent">Content:</label>
                    <textarea id="noteContent" placeholder="Write your note here..." rows="8" required></textarea>
                </div>
                <input type="hidden" id="noteId" value="">
                <button type="submit" class="btn-primary">Save Note</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
